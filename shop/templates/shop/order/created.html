{% extends "base.html" %}

{% block content %}
<style>
    body { background-color: #f4f7f6; }
    .success-card {
        max-width: 500px;
        margin: 50px auto;
        background: white;
        border-radius: 30px;
        padding: 40px 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        position: relative;
    }
    .check-icon {
        width: 80px;
        height: 80px;
        background: #2ecc71;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin: 0 auto 25px;
        box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
        animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .order-number {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 15px;
        border: 2px dashed #dee2e6;
        font-size: 1.2rem;
        color: #0d6efd;
    }
    @keyframes scaleIn {
        from { transform: scale(0); }
        to { transform: scale(1); }
    }
    .btn-home {
        border-radius: 15px;
        padding: 12px 30px;
        font-weight: 600;
        transition: all 0.3s;
    }
    .btn-home:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3); }
</style>

<div class="container text-center px-4" dir="rtl">
    <div class="success-card">
        <div class="check-icon">
            <i class="bi bi-check-lg"></i>
        </div>

        <h1 class="fw-bold mb-3">شكراً لك يا بطل!</h1>
        <p class="text-muted mb-4">تم استلام طلبك بنجاح ونحن الآن نعمل على تجهيزه لك بأفضل صورة.</p>

        <div class="mb-4">
            <span class="text-secondary small d-block mb-2">رقم الطلب الخاص بك:</span>
            <div class="order-number fw-bold">
                #{{ order.id }}
            </div>
        </div>

        <div class="alert alert-warning border-0 rounded-4 small mb-4">
            <i class="bi bi-info-circle me-1"></i>
            سنقوم بالتواصل معك عبر الهاتف لتأكيد موعد التوصيل.
        </div>

        <div class="d-grid gap-2">
            <a href="{% url 'shop:product_list' %}" class="btn btn-primary btn-lg btn-home shadow">
                <i class="bi bi-house-door me-2"></i> العودة للمتجر
            </a>
            <button onclick="window.print()" class="btn btn-outline-secondary btn-sm border-0 mt-2">
                <i class="bi bi-printer me-1"></i> طباعة تفاصيل الطلب
            </button>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
{% endblock %}
