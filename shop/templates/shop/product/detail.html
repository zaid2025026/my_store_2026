<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'shop:product_list' %}">عودة للمتجر</a>
    </div>
</nav>

<div class="container bg-white p-4 rounded shadow-sm">
    <div class="row">
        <div class="col-md-6 text-center">
            {% if product.image %}
                <img src="{{ product.image.url }}" class="img-fluid rounded" alt="{{ product.name }}" style="max-height: 400px;">
            {% endif %}
        </div>
        
        <div class="col-md-6">
            <h1 class="mb-3">{{ product.name }}</h1>
            <h3 class="text-primary mb-3">{{ product.price }} ريال</h3>
            <hr>
            <h5>الوصف:</h5>
            <p class="text-muted">{{ product.description|linebreaks }}</p>
            <hr>
            <p><strong>القسم:</strong> {{ product.category.name }}</p>
            <p><strong>حالة المخزون:</strong> 
                {% if product.stock > 0 %}
                    <span class="badge bg-success">متوفر ({{ product.stock }})</span>
                {% else %}
                    <span class="badge bg-danger">غير متوفر</span>
                {% endif %}
            </p>
            
            <div class="d-grid mt-4">
                <a href="{% url 'shop:cart_add' product.id %}" class="btn btn-primary btn-lg">إضافة إلى السلة</a>
            </div>
            
        </div>
    </div>
</div>

</body>
</html>
