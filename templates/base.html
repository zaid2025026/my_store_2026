<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}متجر زيد الإلكتروني{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f4f7f6; 
            padding-bottom: 70px; /* مساحة للشريط السفلي في الجوال */
        }
        
        /* تصميم النبار العلوي */
        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
        }
        .navbar-brand { color: #0d6efd !important; font-weight: 700; }

        /* شريط التنقل السفلي للجوال */
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 1000;
            border-radius: 20px 20px 0 0;
        }
        .mobile-nav a {
            text-decoration: none;
            color: #6c757d;
            text-align: center;
            font-size: 0.8rem;
        }
        .mobile-nav i { font-size: 1.5rem; display: block; }
        .mobile-nav a.active { color: #0d6efd; }

        @media (min-width: 992px) {
            .mobile-nav { display: none; }
            body { padding-bottom: 0; }
        }

        /* تحسينات عامة */
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'shop:product_list' %}">
                <i class="bi bi-bag-heart-fill"></i> متجر زيد
            </a>
            <div class="d-flex align-items-center">
                <a href="{% url 'cart:cart_detail' %}" class="btn btn-light rounded-pill position-relative d-none d-lg-block">
                    <i class="bi bi-cart3"></i> السلة
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        {{ cart|length }}
                    </span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <div class="mobile-nav d-lg-none">
        <a href="{% url 'shop:product_list' %}" class="active">
            <i class="bi bi-house"></i>
            <span>الرئيسية</span>
        </a>
        <a href="{% url 'cart:cart_detail' %}" class="position-relative">
            <i class="bi bi-cart3"></i>
            <span>السلة</span>
            {% if cart|length > 0 %}
            <span class="position-absolute top-0 start-50 translate-middle badge rounded-circle bg-danger" style="font-size: 0.6rem;">
                {{ cart|length }}
            </span>
            {% endif %}
        </a>
        <a href="#">
            <i class="bi bi-person"></i>
            <span>حسابي</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
